name: Game Engine
on: [workflow_dispatch]
jobs:
  run-step:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate Code Step
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          chmod +x scripts/call_gemini.sh
          ./scripts/call_gemini.sh "Напиши базовую структуру Swift-файла для приложения с App Intents" > output.json
          cat output.json
