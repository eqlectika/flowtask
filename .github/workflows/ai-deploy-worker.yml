name: AI Worker & iOS App Store Deploy

on:
  repository_dispatch:
    types: [run_ai]

jobs:
  # Шаг 1: Генерация кода через Gemini (работает на дешевом Linux)
  generate-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      status: ${{ steps.gemini.outcome }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Ask Gemini and Update Code
        id: gemini
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="${{ github.event.client_payload.prompt }}"
          
          # Запрос к Gemini
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$API_KEY" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d "{\"contents\": [{\"parts\":[{\"text\": \"$PROMPT\"}]}]}" > raw_response.json
          
          # Здесь должен быть ваш скрипт, который парсит JSON и обновляет .swift файлы
          # ...
          
          # Фиксируем изменения в репозитории
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "AI Auto-update: ${PROMPT:0:50}" || echo "No changes to commit"
          git push origin main

  # Шаг 2: Сборка .ipa и деплой в TestFlight/App Store (требует macOS)
  build-and-deploy:
    needs: generate-code
    runs-on: macos-latest # GitHub выделит виртуальный Mac
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # Забираем свежий код, который только что запушил Linux

      - name: Install Apple Certificates
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Скрипт расшифровки и установки сертификатов разработчика Apple в систему macOS
          echo "Установка сертификатов..."

      - name: Build and Archive iOS App
        run: |
          xcodebuild -workspace MyApp.xcworkspace \
                     -scheme MyApp \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath $PWD/build/MyApp.xcarchive archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                     -archivePath $PWD/build/MyApp.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath $PWD/build/output

      - name: Upload to TestFlight / App Store
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # Отправка готового .ipa в Apple App Store Connect
          xcrun altool --upload-app --type ios --file $PWD/build/output/MyApp.ipa --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
