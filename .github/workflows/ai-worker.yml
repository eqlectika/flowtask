on:
  repository_dispatch:
    types: [run_ai]

jobs:
  run-ai-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Запуск AI
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: bash scripts/call_gemini.sh "${{ github.event.client_payload.prompt }}"
