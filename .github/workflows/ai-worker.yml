name: AI Worker
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Ask Gemini and Save
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Запрос к Gemini
          response=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$API_KEY" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d '{"contents": [{"parts":[{"text": "Напиши только Swift код для App Intent: Hello World."}]}]}')
          
          # Извлекаем текст (упрощенно)
          echo "$response" | jq -r '.candidates[0].content.parts[0].text' > generated_app_intent.swift
          
          # Коммитим файл обратно в репозиторий
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add generated_app_intent.swift
          git commit -m "Авто-генерация шага разработки"
          git push
