name: AI Worker
on:
  repository_dispatch:
    types: [run_ai]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Ask Gemini and Save
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Используем текст из вашего запроса (client_payload.prompt)
          PROMPT="${{ github.event.client_payload.prompt }}"
          
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$API_KEY" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d "{\"contents\": [{\"parts\":[{\"text\": \"$PROMPT\"}]}]}" > raw_response.json
          
          cat raw_response.json
