name: Game Engine
on:
  repository_dispatch:
    types: [run_game]
jobs:
  run-step:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Execute Step
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          chmod +x scripts/call_gemini.sh
          ./scripts/call_gemini.sh "${{ github.event.client_payload.prompt }}"
