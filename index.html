<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTask Control</title>
    <link rel="manifest" href="manifest-flow.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FlowTask">
    
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; padding: 10px; margin: 0; }
        h1 { font-size: 1.2rem; color: #007AFF; }
        textarea { width: 100%; height: 120px; background: #1e1e1e; border: 1px solid #333; color: #fff; border-radius: 10px; padding: 15px; box-sizing: border-box; font-size: 16px; }

    .header-container {
        display: flex;
        align-items: center;
        gap: 10px; /* Отступ между логотипом и текстом */
        margin-bottom: 15px;
    }
    
    .logo-link {
        display: block;
        text-decoration: none;
    }
    .logo-img {
        width: 44px;
        height: auto;
        display: block;
    }
    
    h1 { 
        font-size: 1.2rem; 
        color: #007AFF; 
        margin: 0; /* Убираем стандартные отступы h1 */
    }

        /* Стили для селектора режимов */
        .mode-container { margin: 15px 0; background: #1e1e1e; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .mode-container label { display: block; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        select { width: 100%; padding: 12px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 8px; font-size: 16px; -webkit-appearance: none; }
        
        button { width: 100%; padding: 15px; background: #007AFF; border: none; border-radius: 10px; color: #fff; font-size: 18px; margin-top: 10px; cursor: pointer; }
        .status { margin-top: 20px; padding: 15px; background: #1e1e1e; border-radius: 10px; border-left: 5px solid #007AFF; }
    </style>
</head>
<body>
<div class="header-container">
    <a href="index.html" class="logo-link">
        <img src="logo.png" alt="Logo" class="logo-img">
    </a>
    <h1>FlowTask</h1>
</div>
    <textarea id="prompt" placeholder="Введите задачу..."></textarea>
    
        <select id="taskMode" class="mode-container">
            <option value="run_ai">Только AI (Быстрый ответ / AI Worker)</option>
            <option value="run_test_build">Тестовая сборка iOS (Без подписи / Simulator)</option>
            <option value="run_ai_deploy">AI + Сборка и Деплой iOS (Full Deploy)</option>
        </select>

    <button onclick="triggerTask()">Запустить задачу</button>
    
    <div class="status" id="status">Статус: Ожидание ввода</div>

    <script>
        async function triggerTask() {
            const statusDiv = document.getElementById('status');
            const promptText = document.getElementById('prompt').value;
            const eventType = document.getElementById('taskMode').value;
            
            if (!promptText) return alert('Введите задачу!');

            // Безопасно запрашиваем токен, если его еще нет в памяти браузера
            let token = localStorage.getItem('gh_token');
            if (!token) {
                token = prompt('Введите ваш GitHub Personal Access Token:');
                if (token) {
                    localStorage.setItem('gh_token', token);
                } else {
                    return alert('Без токена запуск невозможен!');
                }
            }

            statusDiv.innerText = 'Статус: Отправка запроса...';
            
            try {
                const response = await fetch('https://api.github.com/repos/eqlectika/flowtask/dispatches', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        event_type: eventType, // Динамический выбор типа экшена
                        client_payload: { prompt: promptText }
                    })
                });

                if (response.ok) {
                    statusDiv.innerText = `Статус: Успешно! Запущен [${eventType}].`;
                    document.getElementById('prompt').value = ''; // Очистить поле
                } else if (response.status === 401 || response.status === 404) {
                    statusDiv.innerText = 'Статус: Ошибка авторизации. Токен сброшен.';
                    localStorage.removeItem('gh_token'); // Удаляем неверный токен
                } else {
                    statusDiv.innerText = 'Статус: Ошибка ' + response.status;
                }
            } catch (error) {
                statusDiv.innerText = 'Статус: Ошибка сети';
                console.error(error);
            }
        }
    </script>

</body>
</html>
