<!DOCTYPE html>
<html>
<body>
    <h1>Панель управления</h1>
    <textarea id="prompt" placeholder="Что сделать?"></textarea><br>
    <button onclick="run()">Запустить</button>

    <script>
    async function run() {
        const prompt = document.getElementById('prompt').value;
        const response = await fetch('https://api.github.com/repos/eqlectika/FlowTask-Private/dispatches', {
            method: 'POST',
            headers: { 'Authorization': 'token ВАШ_ТОКЕН', 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({ event_type: 'run_ai', client_payload: { prompt: prompt } })
        });
        alert(response.ok ? 'Задача запущена!' : 'Ошибка');
    }
    </script>
</body>
</html>
